# portal.yml — esquema de contenido editable por el Portal LocalLeads
# Sitio: Taller Isidro A. Pons (SPG Talleres) — Astro 5
#
# El Portal SOLO edita los campos declarados aquí. Las claves del frontmatter
# que no se declaran (keywords, related, relatedServices) se conservan intactas
# al guardar, así que la build de Astro nunca se rompe.
version: 1

# Dónde se suben imágenes/logos y la ruta pública que sirve Astro.
# Debe vivir en public/: Astro solo expone public/ en la raíz del sitio; los
# archivos en src/assets/ solo se sirven a través del pipeline <Image>.
media:
  input: public/uploads
  output: /uploads
  extensions: [jpg, jpeg, png, webp, svg, avif]
  maxSize: 4MB

content:
  # ---- Servicios (colección de 12 páginas) ------------------------------
  - name: services
    label: Servicios
    type: collection
    path: src/content/services
    filename: "{slug}.md"
    format: md
    titleField: title
    # Los clientes pueden crear y editar; borrar/renombrar queda para staff.
    operations: { create: true, edit: true, delete: false, rename: false }
    fields:
      - { name: title, label: "Título (SEO)", type: string, required: true,
          help: "Aparece en la pestaña del navegador y en los resultados de Google." }
      - { name: shortTitle, label: "Título corto", type: string, required: true,
          help: "Nombre breve usado en menús y tarjetas." }
      - { name: description, label: "Meta descripción", type: text, required: true,
          help: "Ideal 150-160 caracteres para Google." }
      - { name: summary, label: "Resumen", type: text, required: true,
          help: "Frase de entrada mostrada en la página y en las tarjetas." }
      # Icono restringido a los identificadores que reconoce Icon.astro: si se
      # escribe cualquier otra cosa, el icono se renderiza en blanco sin aviso.
      - name: icon
        label: "Icono"
        type: select
        required: true
        options:
          - { value: wrench, label: "Llave (mecánica general)" }
          - { value: oil, label: "Aceite y filtros" }
          - { value: brake, label: "Frenos" }
          - { value: tire, label: "Neumáticos" }
          - { value: diagnostics, label: "Diagnosis electrónica" }
          - { value: battery, label: "Batería / electricidad" }
          - { value: snowflake, label: "Aire acondicionado" }
          - { value: belt, label: "Correa de distribución" }
          - { value: clutch, label: "Embrague" }
          - { value: suspension, label: "Suspensión y dirección" }
          - { value: clipboard, label: "Revisiones / pre-ITV" }
          - { value: engine, label: "Motor" }
      - { name: order, label: "Orden", type: number, default: 0,
          help: "Posición en los listados (menor = primero)." }
      - { name: featured, label: "Destacado", type: boolean, default: false }
      - { name: body, label: "Contenido", type: rich-text }

  # ---- Guías (colección informativa) ------------------------------------
  - name: guias
    label: Guías
    type: collection
    path: src/content/guias
    filename: "{slug}.md"
    format: md
    titleField: title
    operations: { create: true, edit: true, delete: false, rename: false }
    fields:
      - { name: title, label: "Título", type: string, required: true }
      - { name: description, label: "Meta descripción", type: text, required: true,
          help: "Ideal 150-160 caracteres para Google." }
      - { name: summary, label: "Resumen", type: text, required: true }
      # Requerido por content.config.ts (z.coerce.date, sin default): declararlo
      # evita que una guía creada desde el Portal rompa la build.
      - { name: publishDate, label: "Fecha de publicación", type: date, required: true,
          help: "Formato AAAA-MM-DD." }
      - { name: body, label: "Contenido", type: rich-text }

  # ---- Datos del negocio (singleton -> archivo de datos editable) -------
  - name: business
    label: "Datos del negocio"
    type: singleton
    path: src/data/site.json
    format: json
    fields:
      - { name: name, label: "Nombre del negocio", type: string, required: true,
          help: "Debe coincidir EXACTO con Google Business Profile." }
      - { name: tagline, label: "Eslogan", type: string }
      - { name: description, label: "Descripción (SEO)", type: text }
      - { name: logo, label: "Logo", type: image,
          help: "SVG o PNG. Si se deja vacío, se muestra el nombre como texto." }
      - { name: phone, label: "Teléfono", type: string,
          help: "Actualiza automáticamente los enlaces de llamada y WhatsApp." }
      - { name: email, label: "Email", type: string }
      - { name: whatsappMessage, label: "Mensaje de WhatsApp prerellenado", type: text }
      - name: address
        label: "Dirección"
        type: object
        fields:
          - { name: street, label: "Calle", type: string }
          - { name: district, label: "Barrio / distrito", type: string }
          - { name: locality, label: "Ciudad", type: string }
          - { name: region, label: "Provincia", type: string }
          - { name: postalCode, label: "Código postal", type: string }
          - { name: countryName, label: "País", type: string }
          - { name: country, label: "Código de país (ISO, p. ej. ES)", type: string }
      - name: social
        label: "Redes sociales"
        type: object
        fields:
          - { name: facebook, label: "Facebook URL", type: string }

  # ---- Página de inicio (singleton -> src/data/home.json) ---------------
  - name: homepage
    label: "Página de inicio"
    type: singleton
    path: src/data/home.json
    format: json
    fields:
      - name: seo
        label: "SEO"
        type: object
        fields:
          - { name: title, label: "Título SEO", type: string, required: true }
          - { name: description, label: "Meta descripción", type: text,
              help: "Si se deja vacío se usa la descripción del negocio." }
      - name: hero
        label: "Hero (cabecera)"
        type: object
        fields:
          - { name: eyebrow, label: "Texto superior", type: string }
          - { name: headingLine1, label: "Titular — línea 1", type: string }
          - { name: headingLine2, label: "Titular — línea 2", type: string }
          - { name: headingAccent, label: "Titular — línea destacada", type: string }
          - { name: subcopy, label: "Subtítulo", type: text }
          - { name: ctaPrimary, label: "Botón principal", type: string }
          - { name: ctaSecondary, label: "Botón secundario", type: string }
          - { name: ratingLabel, label: "Etiqueta de reseñas", type: string }
          - { name: statYearsValue, label: "Dato 1 — valor", type: string }
          - { name: statYearsLabel, label: "Dato 1 — etiqueta", type: string }
          - { name: statBrandValue, label: "Dato 2 — valor", type: string }
          - { name: statBrandLabel, label: "Dato 2 — etiqueta", type: string }
      - name: services
        label: "Sección Servicios"
        type: object
        fields:
          - { name: eyebrow, label: "Texto superior", type: string }
          - { name: heading, label: "Título", type: string }
          - { name: intro, label: "Introducción", type: text }
          - { name: ctaAll, label: "Botón ver todos", type: string }
      - name: whyus
        label: "Sección Por qué elegirnos"
        type: object
        fields:
          - { name: eyebrow, label: "Texto superior", type: string }
          - { name: heading, label: "Título", type: string }
      - name: features
        label: "Características (Por qué elegirnos)"
        type: list
        fields:
          - name: icon
            label: "Icono"
            type: select
            options:
              - { value: award, label: "Premio / experiencia" }
              - { value: shield, label: "Garantía / escudo" }
              - { value: wrench, label: "Llave" }
              - { value: diagnostics, label: "Diagnosis" }
              - { value: engine, label: "Motor" }
              - { value: clipboard, label: "Revisiones" }
              - { value: checkCircle, label: "Verificado" }
              - { value: users, label: "Equipo / clientes" }
              - { value: battery, label: "Electricidad" }
              - { value: tire, label: "Neumáticos" }
              - { value: brake, label: "Frenos" }
              - { value: oil, label: "Aceite" }
              - { value: snowflake, label: "Aire acondicionado" }
          - { name: title, label: "Título", type: string }
          - { name: text, label: "Descripción", type: text }
      - name: about
        label: "Sección Sobre nosotros"
        type: object
        fields:
          - { name: eyebrow, label: "Texto superior", type: string }
          - { name: heading, label: "Título", type: string }
          - { name: cta, label: "Botón", type: string }
      - name: aboutPoints
        label: "Sobre nosotros — puntos"
        type: list
        fields:
          - { name: text, label: "Punto", type: string }
      - name: reviews
        label: "Sección Opiniones"
        type: object
        fields:
          - { name: eyebrow, label: "Texto superior", type: string }
          - { name: heading, label: "Título", type: string }
          - { name: ratingPrefix, label: "Texto antes del número", type: string }
          - { name: ratingSuffix, label: "Texto después del número", type: string }
          - { name: ctaGoogle, label: "Botón reseñas Google", type: string }
          - { name: ctaMore, label: "Botón más opiniones", type: string }
      - name: guides
        label: "Sección Guías"
        type: object
        fields:
          - { name: eyebrow, label: "Texto superior", type: string }
          - { name: heading, label: "Título", type: string }
          - { name: ctaAll, label: "Botón ver todas", type: string }
          - { name: ctaRead, label: "Texto leer guía", type: string }
      - name: location
        label: "Sección Ubicación"
        type: object
        fields:
          - { name: heading, label: "Título", type: string }
          - { name: cta, label: "Botón", type: string }
